server:
  port: 8080
  forward-headers-strategy: native
spring:
  output:
    ansi:
      enabled: always
  application:
    name: back
  profiles:
    active: dev
  config:
    import: optional:file:.env[.properties]
  web:
    resources:
      add-mappings: false
  threads:
    virtual:
      enabled: true
  datasource:
    hikari:
      auto-commit: false
  jackson:
    serialization:
      fail-on-empty-beans: false
  jpa:
    open-in-view: false
    show-sql: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        highlight_sql: true
        use_sql_comments: true
        default_batch_fetch_size: 100
logging:
  level:
    com.back: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
    org.hibernate.orm.jdbc.extract: TRACE
    org.springframework.transaction.interceptor: TRACE